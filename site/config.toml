base_url = "https://cgmossa.github.io/miniR"
title = "miniR"
description = "An R interpreter written in Rust"
compile_sass = true
build_search_index = true
generate_feeds = false

[search]
index_format = "elasticlunr_json"

[link_checker]
internal_level = "warn"

[markdown]
insert_anchor_links = "left"
smart_punctuation = true
lazy_async_image = true

[markdown.highlighting]
theme = "github-dark"

[extra]
repo_url = "https://github.com/CGMossa/miniR"
