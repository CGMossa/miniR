<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    {% if page is defined and page.description %}
    <meta name="description" content="{{ page.description }}">
    {% elif section is defined and section.description %}
    <meta name="description" content="{{ section.description }}">
    {% else %}
    <meta name="description" content="{{ config.description }}">
    {% endif %}
    <link rel="stylesheet" href="{{ get_url(path='css/style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{{ config.base_url }}" class="logo">miniR</a>
            <div class="nav-links">
                <a href="{{ get_url(path='@/getting-started.md') }}">Getting Started</a>
                <a href="{{ get_url(path='@/architecture.md') }}">Architecture</a>
                <a href="{{ get_url(path='@/package-runtime.md') }}">Packages</a>
                <a href="{{ get_url(path='@/object-systems.md') }}">S3/S4</a>
                <a href="{{ get_url(path='@/graphics-devices.md') }}">Graphics</a>
                <a href="{{ get_url(path='@/native.md') }}">Native</a>
                <a href="{{ get_url(path='@/_index.md') }}">Docs</a>
                <a href="{{ config.extra.repo_url }}">GitHub</a>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>miniR v0.2.0 &mdash; An R interpreter written in Rust</p>
    </footer>
</body>
</html>
