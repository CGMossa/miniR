<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    {% if page is defined and page.description %}
    <meta name="description" content="{{ page.description }}">
    {% elif section is defined and section.description %}
    <meta name="description" content="{{ section.description }}">
    {% else %}
    <meta name="description" content="{{ config.description }}">
    {% endif %}
    <link rel="stylesheet" href="{{ get_url(path='site.css') }}">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{{ config.base_url }}" class="logo">miniR</a>
            <div class="nav-links">
                <a href="{{ get_url(path='@/getting-started.md') }}">Get Started</a>
                <a href="{{ get_url(path='@/architecture.md') }}">Architecture</a>
                <a href="{{ get_url(path='@/native.md') }}">Native</a>
                <a href="{{ get_url(path='@/cran.md') }}">CRAN</a>
                <a href="{{ config.base_url }}/manual/">User Manual</a>
                <a href="{{ config.base_url }}/rustdoc/r/">API Docs</a>
                <a href="{{ config.extra.repo_url }}">GitHub</a>
                <div class="search-container">
                    <input id="search" type="search" placeholder="Search docs...">
                    <div class="search-results">
                        <div class="search-results__items"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>miniR v0.2.0 — An R interpreter written in Rust — <a href="{{ config.extra.repo_url }}">GitHub</a></p>
    </footer>
    <script type="text/javascript" src="{{ get_url(path='elasticlunr.min.js') }}"></script>
    <script type="text/javascript" src="{{ get_url(path='search.js') }}"></script>
</body>
</html>
