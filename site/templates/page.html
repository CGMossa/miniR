{% extends "base.html" %}

{% block title %}{{ page.title }} &mdash; miniR{% endblock %}

{% block content %}
<article class="doc-page">
    <header class="page-header">
        <p class="eyebrow">Documentation</p>
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
        {% endif %}
    </header>
    <div class="page-body">
        {{ page.content | safe }}
    </div>
    <p class="page-back">
        <a href="{{ get_url(path='@/_index.md') }}">Back to docs overview</a>
    </p>
</article>
{% endblock %}
