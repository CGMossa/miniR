name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, lint, test
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq --no-install-recommends \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev libxkbcommon-dev \
            libwayland-dev libgl1-mesa-dev libegl1-mesa-dev libatk1.0-dev

      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Vendor dependencies
        run: |
          cargo vendor "$PWD/vendor"
          mkdir -p .cargo
          printf '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source.vendored-sources]\ndirectory = "%s/vendor"\n' "$PWD" > .cargo/config.toml

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --all-targets -F full -- -D warnings
        run: cargo clippy --all-targets -F full -- -D warnings

      - name: cargo test -F full
        run: cargo test -F full
