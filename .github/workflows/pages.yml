name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Build rustdoc
        env:
          RUSTFLAGS: --cfg=docsrs
          RUSTDOCFLAGS: --cfg=docsrs -Z unstable-options --document-private-items
        run: cargo doc --no-deps -Z rustdoc-map -F default,tls,linalg,svg-device,raster-device,pdf-device,parquet,native

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.19.2"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/

      - name: Build site
        run: cd site && zola build

      - name: Copy rustdoc into site
        run: cp -r target/doc site/public/rustdoc

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Fix permissions
        run: |
          chmod -c -R +rX "site/public" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
